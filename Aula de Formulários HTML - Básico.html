<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Formulários HTML - Básico</title>
</head>
<body>

    <h1>Cadastro de Novo Aluno</h1>
    <hr>

    <form action="#" method="get">

        <h3>Informações Pessoais</h3>

        <p>
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
        </p>

        <p>
            <label for="nome">Sobrenome:</label><br>
            <input type="text" id="nome" name="Sobrenome" placeholder="Digite seu sobrenome">
        </p>

        <p>
            <label for="email">E-mail Corporativo:</label><br>
            <input type="email" id="email" name="email" required>
        </p>

        <p>
            <label for="senha">Senha de Acesso:</label><br>
            <input type="password" id="senha" name="senha">
        </p>

        <p>
            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" name="idade" min="16" max="100">
        </p>

        <hr>

        <h3>Preferências e Seleção</h3>

        <p>
            <label for="turno">Turno de Estudo:</label><br>
            <select id="turno" name="turno">
                <option value="">-- Selecione --</option>
                <option value="manha">Manhã</option>
                <option value="tarde">Tarde</option>
                <option value="noite">Noite</option>
                <option value="integral">Integral</option>
            </select>
        </p>

        <p>
            <label>Nível de Conhecimento:</label><br>
            <input type="radio" id="iniciante" name="nivel" value="iniciante">
            <label for="iniciante">Iniciante</label>

            <input type="radio" id="intermediario" name="nivel" value="intermediario">
            <label for="intermediario">Intermediário</label>

            <input type="radio" id="avançado" name="nivel" value="avançado">
            <label for="avançado">avançado</label>
        </p>

        <p>
            <label>Linguagens de Interesse:</label><br>
            <input type="checkbox" id="html" name="interesse" value="html">
            <label for="html">HTML5</label>

            <input type="checkbox" id="sql" name="interesse" value="sql">
            <label for="sql">SQL</label>

            <input type="checkbox" id="css" name="interesse" value="css">
            <label for="css">CSS3</label>

            <input type="checkbox" id="javascript" name="interesse" value="javascript">
            <label for="javascript">JAVASCRIPT</label>
        </p>

            <p>
                <label for="date">Data de nascimento:</label><br>
                <input type="date">

            <br>
            <br>
       
                <label for="telefone">Telefone / WhatsApp:</label><br>
                <input type="text" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                
                <p>Como você conheceu a escola?</p>

                <input type="radio" id="google" name="conheceu" value="google">
                <label for="google">Google</label><br>

                <input type="radio" id="redes" name="conheceu" value="redes">
                <label for="redes">Redes Sociais</label><br>

                <input type="radio" id="indicacao" name="conheceu" value="indicacao">
                <label for="indicacao">Indicação de Amigo</label><br>

                <input type="radio" id="outros" name="conheceu" value="outros">
                <label for="outros">Outros</label>
                <br><br>
            </p>
        <hr>

        <h3>Mensagem e Envio</h3>

        <p>
            <label for="bio">Breve Biografia:</label><br>
            <textarea id="bio" name="bio" rows="5" cols="40"></textarea>
        </p>

        <button type="submit">Finalizar Cadastro</button>
        <button type="reset">Limpar Tudo</button>

      
    </form>

</body>
</html>
